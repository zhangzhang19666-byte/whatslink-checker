name: ed2k Link Checker

on:
  workflow_dispatch:
    inputs:
      txt_file:
        description: 'data/ 下的文件名（留空或 all 处理全部）'
        required: false
        default: 'all'
      delay_secs:
        description: '正常请求间隔秒数（默认 2.8）'
        required: false
        default: '2.8'
      retry_delay:
        description: '限流重试轮次中每条请求间隔秒数（默认 5）'
        required: false
        default: '5'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      # 从私有数据仓库拉取 data/ 和 work/（进度续接）
      - name: Fetch data and progress from private repo
        env:
          GH_PAT:    ${{ secrets.GH_PAT }}
          DATA_REPO: ${{ secrets.DATA_REPO }}
        run: |
          echo "📥 从私有仓库 $DATA_REPO 拉取..."
          git clone "https://x-access-token:${GH_PAT}@github.com/${DATA_REPO}.git" _data_repo
          mkdir -p data
          cp _data_repo/*.txt data/ 2>/dev/null || true
          echo "✅ data/ 文件数：$(ls data/*.txt 2>/dev/null | wc -l)"
          if [ -d "_data_repo/work" ]; then
            cp -r _data_repo/work ./
            echo "✅ work/ 进度已恢复"
          else
            mkdir -p work
          fi
          rm -rf _data_repo

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ed2k checker
        env:
          TXT_FILE:    ${{ github.event.inputs.txt_file || 'all' }}
          DELAY_SECS:  ${{ github.event.inputs.delay_secs || '2.8' }}
          RETRY_DELAY: ${{ github.event.inputs.retry_delay || '5' }}
        run: python check.py

      # 无论成功/超时/取消，都把 work/ 推回私有仓库
      - name: Push results and progress back to private repo
        if: always()
        env:
          GH_PAT:    ${{ secrets.GH_PAT }}
          DATA_REPO: ${{ secrets.DATA_REPO }}
        run: |
          git clone "https://x-access-token:${GH_PAT}@github.com/${DATA_REPO}.git" _push_repo
          rm -rf _push_repo/work
          cp -r work _push_repo/work
          cd _push_repo
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add work/
          if git diff --cached --quiet; then
            echo "无变化，跳过推送"
          else
            git commit -m "update work/ [run #${{ github.run_number }}]"
            git push "https://x-access-token:${GH_PAT}@github.com/${DATA_REPO}.git" main
            echo "✅ 结果已推送到私有仓库"
          fi

      # 如果还有未完成任务（或脚本崩溃），自动触发下一次运行
      - name: Auto-trigger next run if needed
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # .needs_rerun 存在 = 脚本正常判断有剩余任务
          # .completed 不存在或 work/ 有 quota_limited = 脚本崩溃/超时，保守地继续触发
          NEEDS_RERUN=false

          if [ -f "work/.needs_rerun" ]; then
            NEEDS_RERUN=true
            echo "⏭️  检测到 .needs_rerun 标记"
          elif [ "${{ job.status }}" != "success" ]; then
            # 脚本崩溃或超时，只要 work/ 里还有 quota_limited 就继续
            if grep -r '"quota_limited"' work/*.jsonl 2>/dev/null | head -1 | grep -q quota_limited; then
              NEEDS_RERUN=true
              echo "⏭️  脚本异常退出但仍有限流未完成，继续触发"
            elif [ "${{ job.status }}" = "cancelled" ] || [ "${{ job.status }}" = "failure" ]; then
              NEEDS_RERUN=true
              echo "⏭️  任务被中断，继续触发以保证进度"
            fi
          fi

          if [ "$NEEDS_RERUN" = "true" ]; then
            echo "等待 30s 后触发下一次..."
            sleep 30
            gh workflow run check.yml \
              --repo ${{ github.repository }} \
              --ref main \
              -f txt_file=all \
              -f delay_secs=2.8 \
              -f retry_delay=5
            echo "✅ 已触发下一次运行"
          else
            echo "🎉 所有任务完成，无需继续"
          fi
