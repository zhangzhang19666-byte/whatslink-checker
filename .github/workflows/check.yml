name: ed2k Link Checker

on:
  workflow_dispatch:
    inputs:
      txt_file:
        description: 'data/ 下的文件名（留空或 all 处理全部）'
        required: false
        default: 'all'
      delay_secs:
        description: '正常请求间隔秒数（默认 2.8）'
        required: false
        default: '2.8'
      retry_delay:
        description: '限流重试轮次中每条请求间隔秒数（默认 5）'
        required: false
        default: '5'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      # 从私有数据仓库拉取 data/ 和 work/（进度续接）
      - name: Fetch data and progress from private repo
        env:
          GH_PAT:    ${{ secrets.GH_PAT }}
          DATA_REPO: ${{ secrets.DATA_REPO }}
        run: |
          echo "📥 从私有仓库 $DATA_REPO 拉取..."
          git clone "https://x-access-token:${GH_PAT}@github.com/${DATA_REPO}.git" _data_repo
          # 拉取 txt 输入文件
          mkdir -p data
          cp _data_repo/*.txt data/ 2>/dev/null || true
          echo "✅ data/ 文件："
          ls data/
          # 恢复 work/ 进度（JSONL + .completed）
          if [ -d "_data_repo/work" ]; then
            cp -r _data_repo/work ./
            echo "✅ work/ 进度已恢复"
          else
            mkdir -p work
          fi
          rm -rf _data_repo

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ed2k checker
        env:
          TXT_FILE:    ${{ github.event.inputs.txt_file || 'all' }}
          DELAY_SECS:  ${{ github.event.inputs.delay_secs || '2.8' }}
          RETRY_DELAY: ${{ github.event.inputs.retry_delay || '5' }}
        run: python check.py

      # 无论成功/超时/取消，都把 work/ 推回私有仓库
      - name: Push results and progress back to private repo
        if: always()
        env:
          GH_PAT:    ${{ secrets.GH_PAT }}
          DATA_REPO: ${{ secrets.DATA_REPO }}
        run: |
          git clone "https://x-access-token:${GH_PAT}@github.com/${DATA_REPO}.git" _push_repo
          # 同步 work/ 到私有仓库
          rm -rf _push_repo/work
          cp -r work _push_repo/work
          cd _push_repo
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add work/
          if git diff --cached --quiet; then
            echo "无变化，跳过推送"
          else
            git commit -m "update work/ results [run #${{ github.run_number }}]"
            git push "https://x-access-token:${GH_PAT}@github.com/${DATA_REPO}.git" main
            echo "✅ 结果已推送到私有仓库"
          fi
